apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "unified-alerts-dashboard.fullname" . }}
  labels:
    {{- include "unified-alerts-dashboard.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "unified-alerts-dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "unified-alerts-dashboard.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "unified-alerts-dashboard.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: GRAFANA_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "unified-alerts-dashboard.secretName" . }}
                  key: GRAFANA_URL
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "unified-alerts-dashboard.secretName" . }}
                  key: GRAFANA_SERVICE_ACCOUNT_TOKEN
            - name: CIRIUM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cirium.apiKeySecretName }}
                  key: {{ .Values.cirium.apiKeySecretKey }}
          readinessProbe:
            httpGet:
              path: /flight-ops/alerts
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/metrics
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.secretProviderClass.enabled }}
          volumeMounts:
            - name: secrets-store
              mountPath: {{ .Values.secretProviderClass.mountPath }}
              readOnly: true
          {{- end }}
      {{- if .Values.secretProviderClass.enabled }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.secretProviderClass.name }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
