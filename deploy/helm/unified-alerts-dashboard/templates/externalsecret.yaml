{{- if .Values.externalSecrets.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "unified-alerts-dashboard.fullname" . }}
  labels:
    {{- include "unified-alerts-dashboard.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecrets.targetName }}
    creationPolicy: Owner
  data:
    - secretKey: GRAFANA_URL
      remoteRef:
        key: {{ .Values.externalSecrets.data.grafanaUrl.remoteRef.key }}
        property: {{ .Values.externalSecrets.data.grafanaUrl.remoteRef.property }}
    - secretKey: GRAFANA_SERVICE_ACCOUNT_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.data.grafanaServiceAccountToken.remoteRef.key }}
        property: {{ .Values.externalSecrets.data.grafanaServiceAccountToken.remoteRef.property }}
{{- end }}
