apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: unified-alerts-dashboard
  namespace: flight-ops
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: unified-alerts-dashboard
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: web
        controlledResources:
          - cpu
          - memory
        minAllowed:
          cpu: 100m
          memory: 256Mi
        maxAllowed:
          cpu: "1"
          memory: 1Gi
