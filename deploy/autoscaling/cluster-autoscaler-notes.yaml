apiVersion: v1
kind: ConfigMap
metadata:
  name: flight-ops-cluster-autoscaler-notes
  namespace: kube-system
data:
  helm-values.yaml: |
    extraArgs:
      cloud-provider: aws
      expander: least-waste
      balance-similar-node-groups: "true"
      skip-nodes-with-system-pods: "false"
      scale-down-unneeded-time: 10m
      scale-down-delay-after-add: 10m
      scale-down-utilization-threshold: "0.5"
    autoDiscovery:
      clusterName: flight-ops-eks
    awsRegion: us-east-1
    rbac:
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/flight-ops-cluster-autoscaler
  asg-tags: |
    k8s.io/cluster-autoscaler/enabled=true
    k8s.io/cluster-autoscaler/flight-ops-eks=owned
  production-shape: |
    Recommended EKS node group layout:
    - system node group: Istio, Prometheus, metrics-server, Prometheus Adapter, cluster autoscaler
    - flight-ops node group: unified alerts dashboard and flight-worker workloads
    - enable cluster autoscaler on both node groups
    - keep pod requests conservative so HPA and autoscaler signals remain meaningful
