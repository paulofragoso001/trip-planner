apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-config
  namespace: monitoring
data:
  config.yaml: |
    rules:
      - seriesQuery: 'http_requests_total{app="unified-alerts-dashboard",namespace!="",pod!=""}'
        resources:
          overrides:
            namespace: {resource: "namespace"}
            pod: {resource: "pod"}
        name:
          matches: "^(.*)_total"
          as: "${1}_rps"
        metricsQuery: 'sum(rate(http_requests_total{<<.LabelMatchers>>}[2m])) by (<<.GroupBy>>)'

      - seriesQuery: 'alert_feed_queue_depth{app="unified-alerts-dashboard",namespace!="",pod!=""}'
        resources:
          overrides:
            namespace: {resource: "namespace"}
            pod: {resource: "pod"}
        name:
          matches: "^(.*)$"
          as: "${1}"
        metricsQuery: 'max(alert_feed_queue_depth{<<.LabelMatchers>>}) by (<<.GroupBy>>)'
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: unified-alerts-dashboard
  namespace: flight-ops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: unified-alerts-dashboard
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Pods
      pods:
        metric:
          name: http_requests_rps
        target:
          type: AverageValue
          averageValue: "20"
    - type: Pods
      pods:
        metric:
          name: alert_feed_queue_depth
        target:
          type: AverageValue
          averageValue: "50"
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: unified-alerts-dashboard
  namespace: flight-ops
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: unified-alerts-dashboard
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: web
        controlledResources:
          - cpu
          - memory
        minAllowed:
          cpu: 250m
          memory: 256Mi
        maxAllowed:
          cpu: "1"
          memory: 1Gi
