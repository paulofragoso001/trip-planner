name: flight-ops-infra

on:
  pull_request:
    branches:
      - main
    paths:
      - infra/terraform/grafana-flight-ops/**
      - .github/workflows/flight-ops-infra.yml
  push:
    branches:
      - main
    paths:
      - infra/terraform/grafana-flight-ops/**
      - .github/workflows/flight-ops-infra.yml
  workflow_dispatch:
    inputs:
      apply:
        default: false
        description: Apply the Terraform plan. Requires production environment approval.
        required: true
        type: boolean

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: flight-ops-infra-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TERRAFORM_WORKING_DIRECTORY: infra/terraform/grafana-flight-ops
  TF_VAR_aws_region: us-east-1

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}

    env:
      TF_VAR_grafana_admin_auth: ${{ secrets.GRAFANA_TERRAFORM_TOKEN }}
      TF_VAR_grafana_url: ${{ secrets.GRAFANA_URL }}
      TF_VAR_provisioning_token_secret_arn: ${{ secrets.GRAFANA_PROVISIONING_TOKEN_SECRET_ARN }}
      TF_VAR_runtime_token_secret_arn: ${{ secrets.GRAFANA_RUNTIME_TOKEN_SECRET_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan

  apply:
    name: Terraform apply
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: plan
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply))
    environment: production

    defaults:
      run:
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}

    env:
      TF_VAR_grafana_admin_auth: ${{ secrets.GRAFANA_TERRAFORM_TOKEN }}
      TF_VAR_grafana_url: ${{ secrets.GRAFANA_URL }}
      TF_VAR_provisioning_token_secret_arn: ${{ secrets.GRAFANA_PROVISIONING_TOKEN_SECRET_ARN }}
      TF_VAR_runtime_token_secret_arn: ${{ secrets.GRAFANA_RUNTIME_TOKEN_SECRET_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve
