name: Native iOS CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "capacitor.config.ts"
      - ".github/workflows/ios-native.yml"
  pull_request:
    paths:
      - "ios/**"
      - "capacitor.config.ts"
      - ".github/workflows/ios-native.yml"

permissions:
  contents: read

env:
  ALMIDY_DERIVED_DATA: ${{ runner.temp }}/almidy-derived-data
  ALMIDY_SOURCE_PACKAGES: ${{ runner.temp }}/almidy-source-packages
  ALMIDY_PACKAGE_CACHE: ${{ runner.temp }}/almidy-package-cache
  CLANG_MODULE_CACHE_PATH: ${{ runner.temp }}/almidy-clang-module-cache
  SWIFT_MODULECACHE_PATH: ${{ runner.temp }}/almidy-swift-module-cache

jobs:
  native-build:
    runs-on: macos-14
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Reject credentials in the native bundle
        shell: bash
        run: |
          if rg -n -i --glob '!*.xcuserstate' \
            '(gh[pousr]_[A-Za-z0-9_]+|github_pat_[A-Za-z0-9_]+|x-access-token:|BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY|GITHUB_TOKEN|GH_TOKEN)' \
            ios/App; then
            echo "GitHub credentials or private key material must never ship in the iOS app."
            exit 1
          fi

      - name: Prepare writable Xcode caches
        shell: bash
        run: |
          mkdir -p "$ALMIDY_DERIVED_DATA" "$ALMIDY_SOURCE_PACKAGES" \
            "$ALMIDY_PACKAGE_CACHE" "$CLANG_MODULE_CACHE_PATH" "$SWIFT_MODULECACHE_PATH"

      - name: Build native app
        run: >-
          xcodebuild
          -project ios/App/App.xcodeproj
          -scheme App
          -sdk iphonesimulator
          -configuration Debug
          -derivedDataPath "$ALMIDY_DERIVED_DATA"
          -clonedSourcePackagesDirPath "$ALMIDY_SOURCE_PACKAGES"
          -packageCachePath "$ALMIDY_PACKAGE_CACHE"
          CODE_SIGNING_ALLOWED=NO
          CLANG_MODULE_CACHE_PATH="$CLANG_MODULE_CACHE_PATH"
          SWIFT_MODULECACHE_PATH="$SWIFT_MODULECACHE_PATH"
          build

      - name: Run native XCTest suite
        run: >-
          xcodebuild
          -project ios/App/App.xcodeproj
          -scheme App
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest'
          -derivedDataPath "$ALMIDY_DERIVED_DATA"
          -clonedSourcePackagesDirPath "$ALMIDY_SOURCE_PACKAGES"
          -packageCachePath "$ALMIDY_PACKAGE_CACHE"
          CODE_SIGNING_ALLOWED=NO
          CLANG_MODULE_CACHE_PATH="$CLANG_MODULE_CACHE_PATH"
          SWIFT_MODULECACHE_PATH="$SWIFT_MODULECACHE_PATH"
          test
